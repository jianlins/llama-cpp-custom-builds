# llama-cpp-custom-builds
name: Linux CPU-only Custom Build (x86_64)

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp version (tag or "latest")'
        required: true
        default: 'latest'
        type: string
      ubuntu_version:
        description: 'Ubuntu version'
        required: true
        default: '24.04'
        type: choice
        options:
          - '24.04'
          - '22.04'
          - '20.04'
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - 'Release'
          - 'RelWithDebInfo'
      enable_openblas:
        description: 'Enable OpenBLAS'
        required: true
        default: true
        type: boolean
      enable_opencl:
        description: 'Enable OpenCL'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            wget \
            curl \
            ccache
          
          if [ "${{ inputs.enable_openblas }}" = "true" ]; then
            sudo apt-get install -y libopenblas-dev
          fi
          
          if [ "${{ inputs.enable_opencl }}" = "true" ]; then
            sudo apt-get install -y ocl-icd-opencl-dev opencl-headers clinfo
          fi
            
      - name: Download llama.cpp source
        run: |
          if [ "${{ inputs.llama_version }}" = "latest" ]; then
            RELEASE_TAG=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          else
            RELEASE_TAG="${{ inputs.llama_version }}"
          fi
          
          echo "Downloading llama.cpp ${RELEASE_TAG}"
          wget -q https://github.com/ggml-org/llama.cpp/archive/refs/tags/${RELEASE_TAG}.tar.gz
          tar -xzf ${RELEASE_TAG}.tar.gz
          mv llama.cpp-${RELEASE_TAG#v} llama.cpp
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          
      - name: Configure CMake
        working-directory: llama.cpp
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DGGML_BLAS=${{ inputs.enable_openblas && 'ON' || 'OFF' }} \
            -DGGML_BLAS_VENDOR=OpenBLAS \
            -DGGML_OPENCL=${{ inputs.enable_opencl && 'ON' || 'OFF' }} \
            -DGGML_BACKEND_DL=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DBUILD_SHARED_LIBS=OFF
            
      - name: Build
        working-directory: llama.cpp
        run: |
          cmake --build build --config ${{ inputs.build_type }} -j $(nproc)
          
      - name: Package artifacts
        run: |
          cd llama.cpp/build
          mkdir -p package/bin package/lib package/meta
          
          # Copy binaries
          find bin -maxdepth 1 -type f \( -name 'llama-*' -o -name 'ggml-*' \) -exec cp -av {} package/bin/ \; 2>/dev/null || true
          
          # Copy libraries
          find . -maxdepth 3 -type f \( -name 'libllama*' -o -name 'libggml*' \) -exec cp -av {} package/lib/ \; 2>/dev/null || true
          
          # Create metadata files
          echo "${{ env.RELEASE_TAG }}" > package/meta/git-describe.txt
          cat /etc/os-release > package/meta/os-release.txt || true
          gcc --version > package/meta/gcc-version.txt
          cmake --version > package/meta/cmake-version.txt
          
          if compgen -G "package/bin/*" > /dev/null; then
            file package/bin/* > package/meta/file-bin.txt || true
            ldd package/bin/* > package/meta/ldd-bin.txt || true
          fi
          
          # Create BUILD_INFO.txt
          cat > package/BUILD_INFO.txt <<EOF
          llama.cpp version: ${{ env.RELEASE_TAG }}
          Architecture: x86_64
          Ubuntu version: ${{ inputs.ubuntu_version }}
          Build type: ${{ inputs.build_type }}
          OpenBLAS: ${{ inputs.enable_openblas }}
          OpenCL: ${{ inputs.enable_opencl }}
          Built on: $(date -u)
          EOF
          
          tar -czf ../../llama-cpp-cpu-linux-x86_64.tar.gz package/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-cpu-linux-x86_64-ubuntu${{ inputs.ubuntu_version }}
          path: llama-cpp-cpu-linux-x86_64.tar.gz
          retention-days: 30
