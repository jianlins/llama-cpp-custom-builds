# llama-cpp-custom-builds
name: Windows CUDA Custom Build

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'GitHub repo to pull from (owner/name)'
        required: false
        default: 'ggml-org/llama.cpp'
        type: string
      llama_version:
        description: 'llama.cpp version (tag or "latest")'
        required: true
        default: 'latest'
        type: string
      cuda_version:
        description: 'CUDA Toolkit version'
        required: true
        default: '12.6.2'
        type: choice
        options:
          - '12.8.2'
          - '12.6.2'
          - '12.4.0'
          - '12.2.0'
          - '11.8.0'
      gpu_architectures:
        description: 'GPU architectures (semicolon-separated)'
        required: true
        default: '70;75;80;86;89;90'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - 'Release'
          - 'RelWithDebInfo'
      enable_cublas:
        description: 'Enable cuBLAS'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: ${{ inputs.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'
          
      - name: Download llama.cpp source
        shell: pwsh
        run: |
          $repo = "${{ inputs.repo }}"
          if ("${{ inputs.llama_version }}" -eq "latest") {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest"
            $releaseTag = $release.tag_name
          } else {
            $releaseTag = "${{ inputs.llama_version }}"
          }

          Write-Host "Downloading $repo $releaseTag"
          $url = "https://github.com/$repo/archive/refs/tags/$releaseTag.zip"
          Invoke-WebRequest -Uri $url -OutFile "llama.zip"
          Expand-Archive -Path "llama.zip" -DestinationPath "."

          $repoName = ($repo -split "/")[-1]
          $candidateDirs = Get-ChildItem -Directory | Where-Object { $_.Name -like "$repoName-*" }
          if (-not $candidateDirs) {
            throw "Could not find extracted source directory for $repoName. Found: $((Get-ChildItem -Directory | Select-Object -ExpandProperty Name) -join ', ')"
          }

          $extractedDir = $candidateDirs | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (Test-Path "llama.cpp") {
            Remove-Item -Path "llama.cpp" -Recurse -Force
          }

          Move-Item -Path $extractedDir.FullName -Destination "llama.cpp"
          if (-not (Test-Path "llama.cpp/CMakeLists.txt")) {
            throw "llama.cpp/CMakeLists.txt not found after extraction. Contents: $((Get-ChildItem -Path 'llama.cpp' -Force | Select-Object -ExpandProperty Name) -join ', ')"
          }
          
          echo "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S llama.cpp `
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.gpu_architectures }}" `
            -DGGML_CUDA_CUBLAS=${{ inputs.enable_cublas && 'ON' || 'OFF' }} `
            -DGGML_BACKEND_DL=OFF `
            -DGGML_NATIVE=OFF `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_EXAMPLES=ON `
            -DBUILD_SHARED_LIBS=OFF
            
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ inputs.build_type }} -j ${env:NUMBER_OF_PROCESSORS}
          
      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "package/bin" -Force
          
          # Copy binaries
          Copy-Item -Path "build/bin/${{ inputs.build_type }}/*.exe" -Destination "package/bin/" -ErrorAction SilentlyContinue
          Copy-Item -Path "build/bin/${{ inputs.build_type }}/*.dll" -Destination "package/bin/" -ErrorAction SilentlyContinue
          
          # Copy CUDA runtime DLLs
          $cudaPath = "$env:CUDA_PATH\bin"
          if (Test-Path $cudaPath) {
            Copy-Item -Path "$cudaPath\cudart64*.dll" -Destination "package/bin/" -ErrorAction SilentlyContinue
            Copy-Item -Path "$cudaPath\cublas64*.dll" -Destination "package/bin/" -ErrorAction SilentlyContinue
            Copy-Item -Path "$cudaPath\cublasLt64*.dll" -Destination "package/bin/" -ErrorAction SilentlyContinue
          }
          
          # Create metadata
          @"
          llama.cpp version: ${{ env.RELEASE_TAG }}
          CUDA version: ${{ inputs.cuda_version }}
          GPU architectures: ${{ inputs.gpu_architectures }}
          Build type: ${{ inputs.build_type }}
          cuBLAS: ${{ inputs.enable_cublas }}
          Built on: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
          "@ | Out-File -FilePath "package/BUILD_INFO.txt"
          
          # Create zip
          Compress-Archive -Path "package/*" -DestinationPath "llama-cpp-cuda${{ inputs.cuda_version }}-windows.zip"
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-cuda${{ inputs.cuda_version }}-windows-x64
          path: llama-cpp-cuda${{ inputs.cuda_version }}-windows.zip
          retention-days: 30
