# llama-cpp-custom-builds
name: Linux CUDA Custom Build

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp version (tag or "latest")'
        required: true
        default: 'latest'
        type: string
      cuda_version:
        description: 'CUDA version'
        required: true
        default: '12.6.2'
        type: choice
        options:
          - '12.8.0'
          - '12.6.2'
          - '12.4.0'
          - '12.2.0'
          - '11.8.0'
      base_os:
        description: 'Base OS for container (affects binary compatibility)'
        required: true
        default: 'rockylinux8'
        type: choice
        options:
          - 'rockylinux8'
          - 'ubuntu22.04'
          - 'ubuntu20.04'
      gpu_architectures:
        description: 'GPU architectures (semicolon-separated, e.g., "70;75;80;86;89")'
        required: true
        default: '70;75;80;86;89;90'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - 'Release'
          - 'RelWithDebInfo'
      enable_cublas:
        description: 'Enable cuBLAS'
        required: true
        default: true
        type: boolean
      enable_flash_attn:
        description: 'Enable Flash Attention'
        required: true
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub release with artifacts'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  BUILD_TYPE: ${{ inputs.build_type }}
  CUDA_VERSION: ${{ inputs.cuda_version }}
  BASE_OS: ${{ inputs.base_os }}

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:${{ inputs.cuda_version }}-devel-${{ inputs.base_os }}
      
    steps:
      - name: Install dependencies (Rocky Linux)
        if: inputs.base_os == 'rockylinux8'
        shell: bash
        run: |
          set -euxo pipefail
          dnf -y install epel-release
          dnf config-manager --set-enabled powertools
          dnf -y install \
            git \
            cmake \
            gcc-toolset-12 \
            make \
            ninja-build \
            tar \
            gzip \
            zip \
            findutils \
            file \
            which \
            curl
          dnf clean all

      - name: Install dependencies (Ubuntu)
        if: startsWith(inputs.base_os, 'ubuntu')
        shell: bash
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            wget \
            curl \
            libcurl4-openssl-dev \
            ccache \
            tar \
            gzip \
            file \
            findutils
          apt-get clean
            
      - name: Checkout llama.cpp source
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          ref: ${{ inputs.llama_version == 'latest' && '' || inputs.llama_version }}
          submodules: recursive
          fetch-depth: 0

      - name: Get version tag
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          if [ "${{ inputs.llama_version }}" = "latest" ]; then
            RELEASE_TAG=$(git describe --tags --always)
          else
            RELEASE_TAG="${{ inputs.llama_version }}"
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "Building llama.cpp ${RELEASE_TAG}"
          
      - name: Show build environment (Rocky Linux)
        if: inputs.base_os == 'rockylinux8'
        shell: bash
        run: |
          set -euxo pipefail
          set +u; source scl_source enable gcc-toolset-12; set -u
          cat /etc/os-release || true
          uname -a
          gcc --version
          g++ --version
          cmake --version
          nvcc --version
          
      - name: Show build environment (Ubuntu)
        if: startsWith(inputs.base_os, 'ubuntu')
        shell: bash
        run: |
          set -euxo pipefail
          cat /etc/os-release || true
          uname -a
          gcc --version
          g++ --version
          cmake --version
          nvcc --version
          
      - name: Configure CMake (Rocky Linux)
        if: inputs.base_os == 'rockylinux8'
        shell: bash
        run: |
          set -euxo pipefail
          set +u; source scl_source enable gcc-toolset-12; set -u
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_COMPILER=$(command -v nvcc) \
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.gpu_architectures }}" \
            -DGGML_CUDA_CUBLAS=${{ inputs.enable_cublas && 'ON' || 'OFF' }} \
            -DGGML_CUDA_FA_ALL_QUANTS=${{ inputs.enable_flash_attn && 'ON' || 'OFF' }} \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS=-Wl,--allow-shlib-undefined
            
      - name: Configure CMake (Ubuntu)
        if: startsWith(inputs.base_os, 'ubuntu')
        shell: bash
        run: |
          set -euxo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="${{ inputs.gpu_architectures }}" \
            -DGGML_CUDA_CUBLAS=${{ inputs.enable_cublas && 'ON' || 'OFF' }} \
            -DGGML_CUDA_FA_ALL_QUANTS=${{ inputs.enable_flash_attn && 'ON' || 'OFF' }} \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DBUILD_SHARED_LIBS=OFF
            
      - name: Build (Rocky Linux)
        if: inputs.base_os == 'rockylinux8'
        shell: bash
        run: |
          set -euxo pipefail
          set +u; source scl_source enable gcc-toolset-12; set -u
          cmake --build build --config ${{ inputs.build_type }} -j $(nproc)
          
      - name: Build (Ubuntu)
        if: startsWith(inputs.base_os, 'ubuntu')
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --config ${{ inputs.build_type }} -j $(nproc)
          
      - name: Package artifacts
        shell: bash
        run: |
          set -euxo pipefail
          
          # Define output directory with OS name
          ARCHIVE_BASENAME="llama-bin-linux-cuda-${{ inputs.cuda_version }}-${{ inputs.base_os }}"
          OUTDIR="${ARCHIVE_BASENAME}-${RELEASE_TAG}"
          
          mkdir -p "${OUTDIR}/bin" "${OUTDIR}/lib" "${OUTDIR}/meta"
          
          # Copy binaries
          if [[ -d build/bin ]]; then
            find build/bin -maxdepth 1 -type f \( -name 'llama-*' -o -name 'ggml-*' \) -exec cp -av {} "${OUTDIR}/bin/" \; 2>/dev/null || true
          fi
          
          # Copy libraries
          find build -maxdepth 3 -type f \( -name 'libllama*' -o -name 'libggml*' \) -exec cp -av {} "${OUTDIR}/lib/" \; 2>/dev/null || true
          
          # Git metadata
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git rev-parse HEAD > "${OUTDIR}/meta/git-commit.txt" 2>/dev/null || echo "${RELEASE_TAG}" > "${OUTDIR}/meta/git-commit.txt"
          echo "${RELEASE_TAG}" > "${OUTDIR}/meta/git-describe.txt"
          
          # Build environment metadata
          cat /etc/os-release > "${OUTDIR}/meta/os-release.txt" 2>/dev/null || true
          nvcc --version > "${OUTDIR}/meta/nvcc-version.txt"
          cmake --version > "${OUTDIR}/meta/cmake-version.txt"
          
          # Binary metadata
          if compgen -G "${OUTDIR}/bin/*" > /dev/null; then
            file "${OUTDIR}"/bin/* > "${OUTDIR}/meta/file-bin.txt" 2>/dev/null || true
            ldd "${OUTDIR}"/bin/* > "${OUTDIR}/meta/ldd-bin.txt" 2>/dev/null || true
          fi
          
          if compgen -G "${OUTDIR}/lib/*" > /dev/null; then
            file "${OUTDIR}"/lib/* > "${OUTDIR}/meta/file-lib.txt" 2>/dev/null || true
            ldd "${OUTDIR}"/lib/* > "${OUTDIR}/meta/ldd-lib.txt" 2>/dev/null || true
          fi
          
          # Create BUILD_INFO.txt
          cat > "${OUTDIR}/BUILD_INFO.txt" <<EOF
llama.cpp version: ${RELEASE_TAG}
CUDA version: ${{ inputs.cuda_version }}
Base OS: ${{ inputs.base_os }}
GPU architectures: ${{ inputs.gpu_architectures }}
Build type: ${{ inputs.build_type }}
cuBLAS: ${{ inputs.enable_cublas }}
Flash Attention: ${{ inputs.enable_flash_attn }}
Built on: $(date -u)
EOF
          
          # Create archive
          tar -czf "${ARCHIVE_BASENAME}-${RELEASE_TAG}.tar.gz" "${OUTDIR}"
          sha256sum "${ARCHIVE_BASENAME}-${RELEASE_TAG}.tar.gz" > "${ARCHIVE_BASENAME}-${RELEASE_TAG}.tar.gz.sha256"
          
          # Save archive basename for later steps
          echo "ARCHIVE_BASENAME=${ARCHIVE_BASENAME}" >> $GITHUB_ENV
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASENAME }}-${{ env.RELEASE_TAG }}
          path: |
            ${{ env.ARCHIVE_BASENAME }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ env.ARCHIVE_BASENAME }}-${{ env.RELEASE_TAG }}.tar.gz.sha256
          retention-days: 30

      - name: Create release
        if: inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ env.ARCHIVE_BASENAME }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ env.ARCHIVE_BASENAME }}-${{ env.RELEASE_TAG }}.tar.gz.sha256
          body: |
            ## Build Information
            - llama.cpp version: ${{ env.RELEASE_TAG }}
            - CUDA version: ${{ inputs.cuda_version }}
            - Base OS: ${{ inputs.base_os }}
            - GPU architectures: ${{ inputs.gpu_architectures }}
            - Build type: ${{ inputs.build_type }}
            - cuBLAS: ${{ inputs.enable_cublas }}
            - Flash Attention: ${{ inputs.enable_flash_attn }}
