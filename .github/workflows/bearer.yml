name: Bearer Security Scan (llama.cpp source)

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'llama.cpp version (tag or "latest")'
        required: true
        default: 'latest'
        type: string

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  bearer-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Download llama.cpp source
        run: |
          if [ "${{ inputs.llama_version }}" = "latest" ]; then
            RELEASE_TAG=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          else
            RELEASE_TAG="${{ inputs.llama_version }}"
          fi

          echo "Downloading llama.cpp ${RELEASE_TAG}"
          wget -q "https://github.com/ggml-org/llama.cpp/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          tar -xzf "${RELEASE_TAG}.tar.gz"
          mv llama.cpp-${RELEASE_TAG#v} llama-src
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Run Bearer scan
        id: report
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc
        with:
          path: llama-src
          format: sarif
          output: results.sarif
          exit-code: 0
        continue-on-error: true

      - name: Warn on findings
        if: always()
        run: |
          if [ -f results.sarif ]; then
            COUNT=$(jq '[.runs[].results[]] | length' results.sarif 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::Bearer found ${COUNT} finding(s) in llama.cpp ${RELEASE_TAG}. See the SARIF upload for details."
            else
              echo "No findings detected by Bearer in llama.cpp ${RELEASE_TAG}."
            fi
          else
            echo "::warning::Bearer scan did not produce a SARIF file."
          fi

      - name: Upload SARIF file
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
